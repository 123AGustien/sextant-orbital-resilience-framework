name: Run Sextant Simulation

on:
  workflow_dispatch:
  push:

jobs:
  simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run simulation engine
        run: python simulation_engine.py
