name: Sextant Master Orchestrator CI

on:
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set project root
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # -----------------------------
      # 🧱 STRUCTURE VALIDATION
      # -----------------------------
      - name: Validate Annex Structure
        shell: bash
        run: |
          REQUIRED=(
            "ANNEX_A_input_structure.md"
            "ANNEX_B_dependency_logic.md"
            "ANNEX_C_cascade_rules.md"
            "ANNEX_D_output_interpretation.md"
            "ANNEX_E_sandbox_protocol.md"
          )

          for file in "${REQUIRED[@]}"; do
            if [ ! -f "annexes/$file" ]; then
              echo "MISSING: $file"
              exit 1
            fi
          done

      # -----------------------------
      # 🧪 SCENARIO TEST LAYER
      # -----------------------------
      - name: Run Scenario Test Suite
        run: |
          if [ -f tests/scenario_test_suite.py ]; then
            python tests/scenario_test_suite.py
          else
            echo "No test suite found"
          fi

      # -----------------------------
      # 🧠 DETERMINISM GATE
      # -----------------------------
      - name: Run Determinism Check
        shell: bash
        run: |
          if [ ! -f run_scenario.py ]; then
            echo "run_scenario.py missing"
            exit 1
          fi

          python run_scenario.py > o1.txt
          python run_scenario.py > o2.txt

          diff o1.txt o2.txt

      # -----------------------------
      # 🚀 CORE EXECUTION
      # -----------------------------
      - name: Run Simulation Engine
        run: |
          if [ -f core/simulation_engine.py ]; then
            python core/simulation_engine.py
          fi

      - name: Run Mission Orchestrator
        run: |
          if [ -f mission_orchestrator.py ]; then
            python mission_orchestrator.py
          fi

      - name: Run Governance Layer
        run: |
          if [ -f mission_governance.py ]; then
            python mission_governance.py
          fi

      # -----------------------------
      # 🛰️ FINAL STATUS
      # -----------------------------
      - name: Final Status
        run: echo "MASTER ORCHESTRATOR COMPLETE"
