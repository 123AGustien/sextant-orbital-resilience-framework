name: Sextant Master Orchestrator CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set project root
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies (if any)
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scenario Test Suite
        run: python scenario_test_suite.py

      - name: Run Mission Orchestrator
        run: python mission_orchestrator.py

      - name: Run Simulation Engine (if exists)
        run: |
          if [ -f simulation_engine.py ]; then python simulation_engine.py; fi

      - name: Run Governance Layer (if exists)
        run: |
          if [ -f mission_governance.py ]; then python mission_governance.py; fi

      - name: Final Status
        run: echo "MASTER ORCHESTRATOR COMPLETE"
