name: Sextant Orbital Scenario Test Suite

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Scenario Test Suite
        run: python scenario_test_suite.py
