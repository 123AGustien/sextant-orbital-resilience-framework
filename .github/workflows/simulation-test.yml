name: Sextant Orbital Scenario Test Suite

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Run Mission Orchestrator
        run: python mission_orchestrator.py
